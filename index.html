<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PXL Sweeper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-card" aria-label="PXL Sweeper game">
        <header class="game-header">
          <div>
            <p class="eyebrow">Classic rules, modern finish</p>
            <h1>PXL Sweeper</h1>
          </div>
          <div class="controls">
            <label class="difficulty-select">
              <span>Mode</span>
              <select id="difficulty-select" aria-label="Select difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
            </label>
            <button id="restart-button" class="restart-button" type="button">
              New Game
            </button>
          </div>
        </header>

        <section class="status-panel" aria-label="Game status">
          <div class="status-block">
            <span class="status-label">Status</span>
            <strong id="status-text">In progress</strong>
          </div>
          <div class="status-block">
            <span class="status-label">Mode</span>
            <strong id="difficulty-text">Easy</strong>
          </div>
          <div class="status-block">
            <span class="status-label">Mines</span>
            <strong id="mine-count-text">10</strong>
          </div>
          <div class="status-block">
            <span class="status-label">Time</span>
            <strong id="timer-text">0s</strong>
          </div>
        </section>

        <div id="board" class="board" role="grid" aria-label="Minesweeper board"></div>

        <p class="help-text">
          Left click reveals a cell. Right click toggles a flag.
        </p>
      </section>
    </main>

    <script src="./src/game.js"></script>
    <script src="./src/main.js"></script>
  </body>
</html>
